# Perfil ≤1 día (RTX 5080 + i9): 18 datasets, holdout 80/20, 1 semilla
# Uso: python scripts/run_experiments.py --override config/experiment_day.yaml --device cuda

cv:
  split: holdout
  test_size: 0.2
  split_seed: 42
  train_seeds: [42]

finetune:
  batch_size: 16
  train_fraction: 0.5   # FT usa 50% del train (estratificado); test completo sin cambios
